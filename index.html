<!DOCTYPE html>
<html>
<head>
    <title>Offer Page</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }
        .container {
            margin-top: 100px;
        }
        #timer {
            font-size: 40px;
            color: red;
            margin: 20px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background: green;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎮 Play Games & Earn Money</h1>
    <p>🌍 Worldwide Offer</p>

    <div id="timer">5</div>

    <button class="btn" onclick="goOffer()">👉 Start Now</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    let time = 5;
    let offerLink = "https://example.com"; // اپنا لنک ڈالیں

    let timerElement = document.getElementById("timer");

    let countdown = setInterval(function(){
        time--;
        timerElement.innerText = time;

        if(time <= 0){
            clearInterval(countdown);
            window.location.href = offerLink; // ✅ redirect (GitHub safe)
        }
    }, 1000);

    window.goOffer = function(){
        window.location.href = offerLink; // button بھی same tab میں
    }

});
</script>

</body>
</html>
