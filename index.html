<!DOCTYPE html>
<html>
<head>
    <title>Offer Page</title>
</head>

<body style="text-align:center; font-family:Arial; background:#f4f4f4;">

    <h1>🎮 Play Games & Earn Money</h1>
    <p>🌍 Worldwide Offer</p>

    <h2 id="timer">5</h2>

    <button onclick="goOffer()" 
    style="padding:15px 30px; font-size:18px; background:green; color:white; border:none; border-radius:8px;">
    👉 Start Now
    </button>

<script>
var time = 5;
var offerLink = "https://www.profitablecpmratenetwork.com/kzawyffjx9?key=902bad60174a6d7abd0ae259b9ce933b"; // 🔥 TEST کے لیے Google رکھیں

var timer = document.getElementById("timer");

var countdown = setInterval(function() {
    time--;
    timer.innerHTML = time;

    if (time <= 0) {
        clearInterval(countdown);
        window.location.href = offerLink;
    }
}, 1000);

function goOffer() {
    window.location.href = offerLink;
}
</script>

</body>
</html>
