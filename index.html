<script>
let time = 5;
let offerLink = "https://example.com"; // https://www.profitablecpmratenetwork.com/nhusha1c?key=35806959de549fa5c5eade417e765b12

// Timer start
document.getElementById("timer").innerText = time;

let countdown = setInterval(function(){
    time--;
    document.getElementById("timer").innerText = time;

    if(time <= 0){
        clearInterval(countdown);
        window.location.href = offerLink; // ✅ redirect fix
    }
}, 1000);

// Button click
function goOffer(){
    window.open(offerLink, "_blank");
}
</script>
