<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn From Games</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1d2671, #c33764);
    color: white;
    text-align: center;
}

.container {
    margin-top: 120px;
}

h1 {
    font-size: 36px;
}

p {
    font-size: 18px;
}

.btn {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: white;
    color: #c33764;
    cursor: pointer;
    margin-top: 20px;
}

#timer {
    font-size: 30px;
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎮 Play Games & Earn Money</h1>
    <p>Worldwide Offer 🌍</p>

    <div id="timer">5</div>

    <button class="btn" onclick="goOffer()">👉 Start Now</button>
</div>

<script>
let time = 5;

let countdown = setInterval(function(){
    time--;
    document.getElementById("timer").innerText = time;

    if(time <= 0){
        clearInterval(countdown);
        goOffer();
    }
}, 1000);

function goOffer(){
    // 👇 اپنا CPA link یہاں ڈالیں
    window.location.href = https://www.profitablecpmratenetwork.com/nhusha1c?key=35806959de549fa5c5eade417e765b12;
}
</script>

</body>
</html>
